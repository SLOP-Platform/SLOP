name: Validate Manifests

on:
  push:
    paths:
      - 'catalog/**'
  pull_request:
    paths:
      - 'catalog/**'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        # Install the full runtime deps (CLAUDE.md CI-checklist #5): the manifest
        # loader imports backend.core.logging → structlog, so an ad-hoc
        # `pip install fastapi pydantic` silently omits a transitive dep and the
        # job fails at import time. requirements.txt is the single source of truth.
        run: pip install -r requirements.txt --root-user-action=ignore -q

      - name: Validate YAML syntax
        run: |
          python -c "
          import yaml
          from pathlib import Path
          errors = []
          for f in sorted(Path('catalog').rglob('*.yaml')):
              if 'registry' in str(f): continue
              try:
                  yaml.safe_load(f.read_text())
              except Exception as e:
                  errors.append(f'{f}: {e}')
          if errors:
              for e in errors: print(e)
              exit(1)
          print(f'All catalog YAML files valid')
          "

      - name: Validate manifest required fields
        run: |
          python -c "
          import sys; sys.path.insert(0, '.')
          from backend.manifests.loader import load_all_manifests, clear_cache
          clear_cache()
          manifests = load_all_manifests()
          errors = []
          required = ['key', 'display_name', 'description', 'category', 'image']
          for key, m in manifests.items():
              for field in required:
                  if not getattr(m, field, None):
                      errors.append(f'{key}: missing {field}')
          if errors:
              for e in errors: print(e)
              sys.exit(1)
          print(f'{len(manifests)} manifests all valid')
          "
        env:
          PYTHONPATH: .
