key: vaultwarden
display_name: Vaultwarden
description: Bitwarden-compatible self-hosted password manager — browser extensions, mobile apps, and sharing
category: productivity
tier: 2
icon: 🔐
version: "1.0"

image: vaultwarden/server
image_tag: latest
linuxserver: false
# Opt into the recoverability backup machinery: ms-backup can archive this
# app's config volume, and the agent tracks its backup freshness.
backup_supported: true

ports:
  web: 80

volumes:
  config: /data

env:
  WEBSOCKET_ENABLED: "true"
  SIGNUPS_ALLOWED: "false"
  DOMAIN: "https://vaultwarden.${DOMAIN}"

# Traefik manages the TLS certificate for this app via ACME.
# The cert-expiry probe monitors the ACME store for certificate health.
tls_cert_path: "{config_root}/traefik/acme.json"

traefik:
  enabled: true
  subdomain: vaultwarden
  # Vaultwarden websocket notifications require these headers
  headers:
    Connection: Upgrade
    Upgrade: websocket

post_deploy:
  - type: wait_healthy
    timeout: 30
  - type: api_ready
    path: /alive
    timeout: 60

health:
  checks:
    - name: api_reachable
      type: http
      path: /alive
      expect_status: 200
      interval: 60
  self_heal:
    - condition: api_reachable
      action: restart
      max_attempts: 3
      cooldown: 60

tags: [passwords, security, bitwarden, productivity]
links:
  docs: https://github.com/dani-garcia/vaultwarden/wiki
  github: https://github.com/dani-garcia/vaultwarden
