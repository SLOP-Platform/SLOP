key: ollama
display_name: Ollama
description: Run large language models locally — Llama, Mistral, Gemma and more
category: ai
tier: 2
icon: 🤖
version: "1.0"

image: ollama/ollama
start_grace_s: 60
pull_timeout_s: 600
image_tag: latest
linuxserver: false

ports:
  web: 11434

volumes:
  config: /root/.ollama

env:
  OLLAMA_HOST: "0.0.0.0"

traefik:
  enabled: true
  subdomain: ollama

gpu:
  optional: true
  warn_if_absent: true
  nvidia: true
  amd: true

post_deploy:
  - type: wait_healthy
    timeout: 90
  - type: api_ready
    path: /api/version
    timeout: 120

health:
  checks:
    - name: api_reachable
      type: http
      path: /api/version
      expect_status: 200
      interval: 60
  self_heal:
    - condition: api_reachable
      action: restart
      max_attempts: 2
      cooldown: 120

tags: [ai, llm, local-ai]
links:
  docs: https://ollama.com/docs
  github: https://github.com/ollama/ollama
