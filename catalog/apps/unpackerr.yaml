key: unpackerr
display_name: Unpackerr
description: TODO — add a one-line description of Unpackerr
category: arr
tier: 2

image: golift/unpackerr
image_tag: latest

ports:
  web: 5656

reverse_proxy:
  enabled: true
  subdomain: unpackerr

volumes:
  config: /config

health:
  checks:
    - name: api_reachable
      type: http
      path: /
      port: 5656
      expect_status: 200
      interval: 30

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /
    timeout: 120
