key: lidarr
display_name: Lidarr
description: Automated music collection manager — monitors releases, downloads, and organises albums
category: arr
tier: 2
icon: 🎵
version: "1.0"

image: lscr.io/linuxserver/lidarr
start_grace_s: 90
health_grace_s: 90
image_tag: latest
linuxserver: true
# Opt into the recoverability backup machinery: ms-backup can archive this
# app's config volume, and the agent tracks its backup freshness.
backup_supported: true

ports:
  web: 8686

volumes:
  config: /config
  media: /data

traefik:
  enabled: true
  subdomain: lidarr

wiring:
  accepts:
    - type: indexer
      from: prowlarr
      description: Prowlarr pushes indexer config to Lidarr via API
    - type: download_client
      from: sabnzbd
      optional: true
      description: SABnzbd registers itself as a download client in Lidarr

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /api/v1/system/status
    timeout: 120
  - type: wire
    target: prowlarr
    wire_type: indexer

health:
  checks:
    - name: api_reachable
      type: http
      path: /api/v1/system/status
      expect_status: 200
      interval: 30
  self_heal:
    - condition: api_reachable
      action: restart
      max_attempts: 3
      cooldown: 60

tags: [arr, music, media-management]
links:
  docs: https://wiki.servarr.com/lidarr
  github: https://github.com/Lidarr/Lidarr

requires:
  - prowlarr
