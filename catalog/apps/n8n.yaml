key: n8n
display_name: n8n
description: TODO — add a one-line description of n8n
category: tools
tier: 2

image: n8nio/n8n
image_tag: latest

ports:
  web: 5678

traefik:
  enabled: true
  subdomain: n8n

volumes:
  config: /home/node/.n8n

health:
  checks:
    - name: api_reachable
      type: http
      path: /
      port: 5678
      expect_status: 200
      interval: 30

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /
    timeout: 120
