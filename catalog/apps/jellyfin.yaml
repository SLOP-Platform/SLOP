key: jellyfin
display_name: Jellyfin
description: Free and open-source media server — no Plex Pass required, hardware transcoding included, no tracking
category: media
tier: 1
icon: 🎞️
version: "1.0"

# ── Access routing ─────────────────────────────────────────────────────────
# service_type: media — Jellyfin uses DIRECT port 443, not Cloudflare Tunnel.
# Cloudflare's ToS prohibits routing video through their CDN/proxy.
# Traefik presents the wildcard cert (*.domain.com) for this subdomain.
# DNS record for jellyfin.domain.com must be set to "DNS only" (gray cloud).

service_type: media

image: jellyfin/jellyfin
start_grace_s: 90
health_grace_s: 90
image_tag: latest
linuxserver: false

ports:
  web: 8096
  extra:
    - name: https
      internal: 8920
      protocol: tcp
    - name: discovery
      internal: 7359
      protocol: udp
    - name: dnla
      internal: 1900
      protocol: udp

volumes:
  config: /config
  custom:
    - host: "{config_root}/jellyfin/cache"
      container: /cache
    - host: "{media_root}/movies"
      container: /movies
    - host: "{media_root}/tv"
      container: /tv
    - host: "{media_root}/music"
      container: /music

env:
  TZ: "${TZ}"
  JELLYFIN_PublishedServerUrl: "https://jellyfin.${DOMAIN}"

gpu:
  optional: true
  warn_if_absent: true
  nvidia: true
  amd: true

traefik:
  enabled: true
  subdomain: jellyfin

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /health
    timeout: 120

health:
  checks:
    - name: api_reachable
      type: http
      path: /health
      expect_status: 200
      interval: 60
  self_heal:
    - condition: api_reachable
      action: restart
      max_attempts: 2
      cooldown: 120

tags: [media, jellyfin, streaming, movies, tv, music, open-source]
links:
  docs: https://jellyfin.org/docs/
  github: https://github.com/jellyfin/jellyfin
