key: overseerr
display_name: Overseerr
description: TODO — add a one-line description of Overseerr
category: arr
tier: 2

image: sctx/overseerr
image_tag: latest

ports:
  web: 5055

reverse_proxy:
  enabled: true
  subdomain: overseerr

volumes:
  config: /app/config

health:
  checks:
    - name: api_reachable
      type: http
      path: /
      port: 5055
      expect_status: 200
      interval: 30

wiring:
  connects_to:
    - type: media_request
      to: sonarr
      optional: true
      description: Register Overseerr as media_request in sonarr
    - type: media_request
      to: radarr
      optional: true
      description: Register Overseerr as media_request in radarr

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /
    timeout: 120
  - type: wire
    target: sonarr
    wire_type: media_request
  - type: wire
    target: radarr
    wire_type: media_request
