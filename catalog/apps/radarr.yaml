key: radarr
display_name: Radarr
description: Automated movie manager — monitors, downloads, and organises films
category: arr
tier: 2
icon: 🎥
version: "1.0"

image: lscr.io/linuxserver/radarr
start_grace_s: 150
health_grace_s: 150
image_tag: latest
linuxserver: true
# Opt into the recoverability backup machinery: ms-backup can archive this
# app's config volume, and the agent tracks its backup freshness.
backup_supported: true

ports:
  web: 7878

volumes:
  config: /config
  media: /data

reverse_proxy:
  enabled: true
  subdomain: radarr

wiring:
  accepts:
    - type: indexer
      from: prowlarr
      description: Prowlarr pushes indexer config to Radarr via API
    - type: download_client
      from: sabnzbd
      optional: true
      description: SABnzbd registers itself as a download client in Radarr
  connects_to:
    - type: library_refresh
      to: plex
      optional: true
      description: Radarr tells Plex to refresh after an import

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /api/v3/system/status
    timeout: 120
  - type: wire
    target: prowlarr
    wire_type: indexer

health:
  checks:
    - name: api_reachable
      type: http
      path: /api/v3/system/status
      expect_status: 200
      interval: 30
  self_heal:
    - condition: api_reachable
      action: restart
      max_attempts: 3
      cooldown: 60

tags: [arr, movies, media-management]
links:
  docs: https://wiki.servarr.com/radarr
  github: https://github.com/Radarr/Radarr

requires:
  - prowlarr
recommends:
  - sabnzbd
  - qbittorrent
