key: tautulli
display_name: Tautulli
description: TODO — add a one-line description of Tautulli
category: monitoring
tier: 2

image: lscr.io/linuxserver/tautulli
image_tag: latest

ports:
  web: 8182

traefik:
  enabled: true
  subdomain: tautulli

volumes:
  config: /config

health:
  checks:
    - name: api_reachable
      type: http
      path: /
      port: 8182
      expect_status: 200
      interval: 30

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /
    timeout: 120
