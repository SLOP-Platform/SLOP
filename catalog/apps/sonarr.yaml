key: sonarr
display_name: Sonarr
description: Automated TV series manager — monitors, downloads, and organises episodes
category: arr
tier: 2
icon: 📺
version: "1.0"

image: lscr.io/linuxserver/sonarr
start_grace_s: 120
health_grace_s: 120
image_tag: latest
linuxserver: true
# Opt into the recoverability backup machinery: ms-backup can archive this
# app's config volume, and the agent tracks its backup freshness.
backup_supported: true

ports:
  web: 8989

volumes:
  config: /config
  media: /data

traefik:
  enabled: true
  subdomain: sonarr

wiring:
  accepts:
    - type: indexer
      from: prowlarr
      description: Prowlarr pushes indexer config to Sonarr via API
    - type: download_client
      from: sabnzbd
      optional: true
      description: SABnzbd registers itself as a download client in Sonarr
    - type: notification
      from: plex
      optional: true
      description: Plex notifies Sonarr of playback events (optional)
  connects_to:
    - type: library_refresh
      to: plex
      optional: true
      description: Sonarr tells Plex to refresh after an import

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /api/v3/system/status
    timeout: 180
  - type: wire
    target: prowlarr
    wire_type: indexer

health:
  checks:
    - name: api_reachable
      type: http
      path: /api/v3/system/status
      expect_status: 200
      interval: 30
  self_heal:
    - condition: api_reachable
      action: restart
      max_attempts: 3
      cooldown: 60

tags: [arr, tv, media-management]
links:
  docs: https://wiki.servarr.com/sonarr
  github: https://github.com/Sonarr/Sonarr

requires:
  - prowlarr
recommends:
  - sabnzbd
  - qbittorrent
