key: netdata
display_name: Netdata
description: Real-time system performance monitoring — CPU, memory, disk, network with zero config
category: monitoring
tier: 2
icon: 📊
version: "1.0"

image: netdata/netdata
image_tag: latest
linuxserver: false

ports:
  web: 19999

volumes:
  config: /etc/netdata
  custom:
    - host: /proc
      container: /host/proc
      readonly: true
    - host: /sys
      container: /host/sys
      readonly: true
    - host: /var/run/docker.sock
      container: /var/run/docker.sock
      readonly: true

env:
  DOCKER_HOST: /var/run/docker.sock

reverse_proxy:
  enabled: true
  subdomain: netdata

post_deploy:
  - type: wait_healthy
    timeout: 30
  - type: api_ready
    path: /api/v1/info
    timeout: 60

health:
  checks:
    - name: api_reachable
      type: http
      path: /api/v1/info
      expect_status: 200
      interval: 60

tags: [monitoring, metrics, performance, system]
links:
  docs: https://learn.netdata.cloud
  github: https://github.com/netdata/netdata
