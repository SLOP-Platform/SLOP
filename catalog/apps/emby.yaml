key: emby
display_name: Emby Server
description: Personal media server with rich metadata, mobile sync, and hardware transcoding — Premiere optional
category: media
tier: 1
icon: 📺
version: "1.0"

# service_type: media — direct port 443, not Cloudflare Tunnel (ToS restriction).
service_type: media

image: emby/embyserver
start_grace_s: 120
health_grace_s: 120
image_tag: latest
linuxserver: false

ports:
  web: 8096
  extra:
    - name: https
      internal: 8920
      protocol: tcp

volumes:
  config: /config
  custom:
    - host: "{media_root}/movies"
      container: /movies
    - host: "{media_root}/tv"
      container: /tv
    - host: "{media_root}/music"
      container: /music

env:
  TZ: "${TZ}"
  UID: "${PUID}"
  GID: "${PGID}"

gpu:
  optional: true
  warn_if_absent: true
  nvidia: true
  amd: true

reverse_proxy:
  enabled: true
  subdomain: emby

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /emby/system/info/public
    timeout: 120

health:
  checks:
    - name: api_reachable
      type: http
      path: /emby/system/info/public
      expect_status: 200
      interval: 60

tags: [media, emby, streaming, movies, tv, music]
links:
  docs: https://emby.media/support/articles/quick-start.html
  github: https://github.com/MediaBrowser/Emby
