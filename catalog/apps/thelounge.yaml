key: thelounge
display_name: The Lounge
description: TODO — add a one-line description of The Lounge
category: tools
tier: 2

image: lscr.io/linuxserver/thelounge
image_tag: latest

ports:
  web: 9001

traefik:
  enabled: true
  subdomain: thelounge

volumes:
  config: /config

health:
  checks:
    - name: api_reachable
      type: http
      path: /
      port: 9001
      expect_status: 200
      interval: 30

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /
    timeout: 120
