key: freshrss
display_name: FreshRSS
description: Self-hosted RSS feed aggregator — replace Feedly with a fast, extensible reader
category: productivity
tier: 2
icon: 📡
version: "1.0"

image: lscr.io/linuxserver/freshrss
image_tag: latest
linuxserver: true
# Opt into the recoverability backup machinery: ms-backup can archive this
# app's config volume, and the agent tracks its backup freshness.
backup_supported: true

ports:
  web: 80

volumes:
  config: /config

env:
  TZ: "${TZ}"

reverse_proxy:
  enabled: true
  subdomain: freshrss

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /
    timeout: 90

health:
  checks:
    - name: reachable
      type: http
      path: /
      expect_status: 200
      interval: 60

tags: [rss, feeds, news, productivity, reader]
links:
  docs: https://freshrss.github.io/FreshRSS/en/admins/01_Index.html
  github: https://github.com/FreshRSS/FreshRSS
