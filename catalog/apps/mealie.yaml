key: mealie
display_name: Mealie
description: Self-hosted recipe manager with meal planning, shopping lists, and cookbook import
category: productivity
tier: 2
icon: 🍽️
version: "1.0"

image: ghcr.io/mealie-recipes/mealie
image_tag: latest
linuxserver: false
# Opt into the recoverability backup machinery: ms-backup can archive this
# app's config volume, and the agent tracks its backup freshness.
backup_supported: true

ports:
  web: 9000

volumes:
  config: /app/data

# Mealie defaults to SQLite unless DB_ENGINE=postgres + the POSTGRES_* connection
# vars are set; without this block the declared postgres dependency spins up the
# managed postgres but mealie silently ignores it and runs on SQLite (#1210 empty-env
# class). Connects as the managed-postgres superuser `slop` with the generated
# ${POSTGRES_PASSWORD}; POSTGRES_DB=mealie is the per-app database the installer
# provisions at install time (db_provision._provision_app_db), matching the
# affine/umami/zilean per-app-DB pattern.
env:
  DB_ENGINE: postgres
  POSTGRES_SERVER: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_USER: slop
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
  POSTGRES_DB: mealie

dependencies:
  postgres: true

reverse_proxy:
  enabled: true
  subdomain: mealie

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /api/app/about
    timeout: 120

health:
  checks:
    - name: api_reachable
      type: http
      path: /api/app/about
      expect_status: 200
      interval: 60
  self_heal:
    - condition: api_reachable
      action: restart
      max_attempts: 3
      cooldown: 60

tags: [recipes, meal-planning, cooking, productivity]
links:
  docs: https://docs.mealie.io
  github: https://github.com/mealie-recipes/mealie
