key: filebot
display_name: FileBot
description: TODO — add a one-line description of FileBot
category: tools
tier: 2

image: jlesage/filebot
image_tag: latest

ports:
  web: 5800

reverse_proxy:
  enabled: true
  subdomain: filebot

volumes:
  config: /config

health:
  checks:
    - name: api_reachable
      type: http
      path: /
      port: 5800
      expect_status: 200
      interval: 30

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /
    timeout: 120
