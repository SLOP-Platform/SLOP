key: memos
display_name: Memos
description: Lightweight privacy-first note-taking — quick capture, markdown, tags, and sharing
category: productivity
tier: 2
icon: 📝
version: "1.0"

image: neosmemo/memos
image_tag: stable
linuxserver: false
# Opt into the recoverability backup machinery: ms-backup can archive this
# app's config volume, and the agent tracks its backup freshness.
backup_supported: true

ports:
  web: 5230

volumes:
  config: /var/opt/memos

reverse_proxy:
  enabled: true
  subdomain: memos

post_deploy:
  - type: wait_healthy
    timeout: 30
  - type: api_ready
    path: /api/v1/auth/status
    timeout: 60

health:
  checks:
    - name: api_reachable
      type: http
      path: /api/v1/auth/status
      expect_status: 200
      interval: 60

tags: [notes, markdown, productivity, lightweight]
links:
  docs: https://www.usememos.com/docs
  github: https://github.com/usememos/memos
