key: vikunja
display_name: Vikunja
description: Open-source project management — tasks, kanban, gantt, calendars, and team sharing
category: productivity
tier: 2
icon: 📋
version: "1.0"

image: vikunja/vikunja
image_tag: latest
linuxserver: false
# Opt into the recoverability backup machinery: ms-backup can archive this
# app's config volume, and the agent tracks its backup freshness.
backup_supported: true

ports:
  web: 3456

volumes:
  config: /app/vikunja/files

env:
  VIKUNJA_SERVICE_FRONTENDURL: "https://vikunja.${DOMAIN}"
  VIKUNJA_DATABASE_TYPE: postgres

dependencies:
  postgres: true

reverse_proxy:
  enabled: true
  subdomain: vikunja

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /api/v1/info
    timeout: 120

health:
  checks:
    - name: api_reachable
      type: http
      path: /api/v1/info
      expect_status: 200
      interval: 60
  self_heal:
    - condition: api_reachable
      action: restart
      max_attempts: 3
      cooldown: 60

tags: [tasks, kanban, projects, productivity, team]
links:
  docs: https://vikunja.io/docs
  github: https://github.com/go-vikunja/vikunja
