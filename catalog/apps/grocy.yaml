key: grocy
display_name: Grocy
description: TODO — add a one-line description of Grocy
category: tools
tier: 2

image: lscr.io/linuxserver/grocy
image_tag: latest

ports:
  web: 9283

reverse_proxy:
  enabled: true
  subdomain: grocy

volumes:
  config: /config

health:
  checks:
    - name: api_reachable
      type: http
      path: /
      port: 9283
      expect_status: 200
      interval: 30

post_deploy:
  - type: wait_healthy
    timeout: 60
  - type: api_ready
    path: /
    timeout: 120
