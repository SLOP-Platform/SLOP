key: actual_budget
display_name: Actual Budget
description: Privacy-first local-first personal finance and budgeting — zero-based budgeting that actually works
category: productivity
tier: 2
icon: 💰
version: "1.0"

image: ghcr.io/actualbudget/actual-server
image_tag: latest
linuxserver: false
# Opt into the recoverability backup machinery: ms-backup can archive this
# app's config volume, and the agent tracks its backup freshness.
backup_supported: true

ports:
  web: 5006

volumes:
  config: /data

reverse_proxy:
  enabled: true
  subdomain: budget

post_deploy:
  - type: wait_healthy
    timeout: 30
  - type: api_ready
    path: /
    timeout: 60

health:
  checks:
    - name: reachable
      type: http
      path: /
      expect_status: 200
      interval: 60

tags: [finance, budget, money, productivity, local-first]
links:
  docs: https://actualbudget.org/docs
  github: https://github.com/actualbudget/actual
